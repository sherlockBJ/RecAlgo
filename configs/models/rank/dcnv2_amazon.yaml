# DCNV2 on Amazon Electronics — Wang et al., DCN V2, WWW 2021.
#
# DCNV2 is a CONTEXT-aware (CTR) model: point-wise, BCE loss, AUC/LogLoss eval.
# RecBole auto-merges quick_start_config/context-aware.yaml based on the model
# type (mode:labeled, train_neg_sample_args:~, metrics:[AUC,LogLoss]); we supply
# the fields, the rating->label threshold (REQUIRED — the only label source in
# labeled mode), and the model hyper-parameters.
#
# amazon-electronics auto-downloads via RecBole (ships user_id/item_id/rating/
# timestamp, no item/user feature files). Target: AUC in the ~0.78-0.85 range
# (benchmark sanity check, not an exact paper-table match — RecBole's split
# differs from the original paper).

# ---------------------------------------------------------------------------
# Dataset fields + label
# ---------------------------------------------------------------------------
load_col:
  inter: [user_id, item_id, rating, timestamp]
threshold:
  rating: 4            # label = 1 if rating >= 4 else 0 (rating dropped after)
LABEL_FIELD: label

# ---------------------------------------------------------------------------
# Model hyper-parameters (RecBole DCNV2 defaults)
# ---------------------------------------------------------------------------
embedding_size: 16
mlp_hidden_size: [768, 768]
cross_layer_num: 3
structure: stacked
mixed: False
dropout_prob: 0.2
reg_weight: 2

# ---------------------------------------------------------------------------
# Training (fast budget: epochs 50, patience 5)
# ---------------------------------------------------------------------------
epochs: 50
train_batch_size: 4096
learner: adam
learning_rate: 0.001
stopping_step: 5
loss_decimal_place: 4
eval_step: 1

# ---------------------------------------------------------------------------
# Evaluation: labeled CTR (AUC/LogLoss over the labeled test split)
# ---------------------------------------------------------------------------
eval_args:
  split: {RS: [0.8, 0.1, 0.1]}
  order: RO
  group_by: ~
  mode: labeled
metrics: [AUC, LogLoss]
valid_metric: AUC
eval_batch_size: 40960

seed: 2024
reproducibility: true
